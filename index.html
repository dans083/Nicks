<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nicolly 🖤</title>

  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mp3">
</audio>

<!-- INICIO -->
<section class="tela ativa" id="inicio">
  <div class="conteudo">

    <h1>Nicolly</h1>

    <button onclick="abrirGaleria()">Entrar</button>
  </div>
</section>

<!-- GALERIA -->
<section class="tela" id="galeria">

  <div class="conteudo">

    <h2>Momentos</h2>

    <div class="grid">
      <img src="foto1.jpg">
      <img src="foto2.jpg">
      <img src="foto3.jpg">

      <video controls>
        <source src="video.mp4" type="video/mp4">
      </video>
    </div>

    <p class="legenda">Para essa garota especil e apaixonada na Billie 🖤</p>

    <button onclick="voltar()">Voltar</button>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
